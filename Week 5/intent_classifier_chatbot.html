/* ── STOP WORDS ── */
const STOP=new Set(["a","an","the","is","are","was","were","be","been","have","has","do","does","did","will","would","could","should","may","might","i","me","my","we","you","your","he","she","it","they","them","this","that","of","in","on","at","to","for","with","by","from","as","and","or","but","if","when","how","what","which","who","not","any","all","some","very","just","also","get","can","need","want","please","tell","know","show","give","sir","hi","hello","dear"]);

function tokenize(t){
  return t.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>1&&!STOP.has(w));
}

/* ── NAIVE BAYES CLASSIFIER ── */
class NaiveBayes{
  constructor(){this.priors={};this.likelihoods={};this.vocab=new Set();this.total=0;}
  train(examples,label){
    this.priors[label]=(this.priors[label]||0)+examples.length;
    this.total+=examples.length;
    if(!this.likelihoods[label])this.likelihoods[label]={};
    examples.forEach(ex=>{
      tokenize(ex).forEach(t=>{
        this.vocab.add(t);
        this.likelihoods[label][t]=(this.likelihoods[label][t]||0)+1;
      });
    });
  }
  classify(text){
    const toks=tokenize(text);
    const V=this.vocab.size;
    const scores={};
    Object.keys(this.priors).forEach(label=>{
      const prior=Math.log(this.priors[label]/this.total);
      const totalTerms=Object.values(this.likelihoods[label]).reduce((s,v)=>s+v,0);
      const logLik=toks.reduce((s,t)=>{
        const count=(this.likelihoods[label][t]||0)+1;
        return s+Math.log(count/(totalTerms+V));
      },0);
      scores[label]=prior+logLik;
    });
    /* convert log scores to probabilities via softmax */
    const vals=Object.values(scores);
    const maxVal=Math.max(...vals);
    const exps={};let sumExp=0;
    Object.keys(scores).forEach(k=>{exps[k]=Math.exp(scores[k]-maxVal);sumExp+=exps[k];});
    const probs={};Object.keys(exps).forEach(k=>{probs[k]=exps[k]/sumExp;});
    const sorted=Object.entries(probs).sort((a,b)=>b[1]-a[1]);
    return{top:sorted[0],all:sorted,probs};
  }
}

const nb=new NaiveBayes();
INTENTS.forEach(i=>nb.train(i.examples,i.id));

/* ── INTENT INDEX ── */
const intentMap={};INTENTS.forEach(i=>{intentMap[i.id]=i;});
const sessionCounts={};INTENTS.forEach(i=>{sessionCounts[i.id]=0;});
let totalQ=0,lowConf=0;

function buildIndex(){
  const panel=document.getElementById('intent-index');
  panel.innerHTML='';
  INTENTS.forEach(intent=>{
    const card=document.createElement('div');
    card.className='ii-card';card.id='ii-'+intent.id;
    card.innerHTML=`<div class="ii-top"><div class="ii-dot" style="background:${intent.color}"></div><span class="ii-name">${intent.label}</span><span class="ii-count" id="cnt-${intent.id}">0</span></div><div class="ii-kw">${intent.desc}</div>`;
    panel.appendChild(card);
  });
}
buildIndex();

/* ── CHART ── */
let distChart=null;
function buildChart(){
  if(distChart)distChart.destroy();
  const labels=INTENTS.map(i=>i.label);
  const data=INTENTS.map(i=>sessionCounts[i.id]);
  const colors=INTENTS.map(i=>i.color);
  distChart=new Chart(document.getElementById('dist-chart'),{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},autoSkip:false,maxRotation:35}},y:{ticks:{font:{size:10},stepSize:1},beginAtZero:true}}}
  });
}
buildChart();

function updateStats(intentId){
  sessionCounts[intentId]++;
  totalQ++;
  document.getElementById('s-total').textContent=totalQ;
  document.getElementById('s-acc').textContent=Math.round((totalQ-lowConf)/Math.max(totalQ,1)*100)+'%';
  document.getElementById('s-lowconf').textContent=lowConf;
  document.getElementById('cnt-'+intentId).textContent=sessionCounts[intentId];
  INTENTS.forEach(i=>{const el=document.getElementById('ii-'+i.id);if(el)el.classList.remove('active');});
  const ac=document.getElementById('ii-'+intentId);
  if(ac){ac.classList.add('active');ac.style.borderColor=intentMap[intentId].color;}
  buildChart();
}

/* ── MESSAGES ── */
function addMsg(role,html){
  const c=document.getElementById('msgs');
  const row=document.createElement('div');row.className='row '+(role==='u'?'u':'');
  const av=document.createElement('div');av.className='av '+(role==='u'?'u':'b');av.textContent=role==='u'?'U':'AI';
  const bub=document.createElement('div');bub.className='bub '+(role==='u'?'u':'b');bub.innerHTML=html;
  row.appendChild(av);row.appendChild(bub);c.appendChild(row);c.scrollTop=c.scrollHeight;
}
function showTyping(){
  const c=document.getElementById('msgs');const r=document.createElement('div');r.className='row';r.id='typ';
  const av=document.createElement('div');av.className='av b';av.textContent='AI';
  const bub=document.createElement('div');bub.className='bub b';bub.innerHTML='<div style="display:flex;gap:3px;padding:2px 0"><div class="dt"></div><div class="dt"></div><div class="dt"></div></div>';
  r.appendChild(av);r.appendChild(bub);c.appendChild(r);c.scrollTop=c.scrollHeight;
}
function removeTyping(){const e=document.getElementById('typ');if(e)e.remove();}

const CONF_THRESHOLD=0.30;

async function go(preset){
  const inp=document.getElementById('inp');const btn=document.getElementById('sbtn');
  const q=(preset||inp.value).trim();if(!q)return;
  inp.value='';btn.disabled=true;
  addMsg('u',q);
  showTyping();
  await new Promise(r=>setTimeout(r,300+Math.random()*280));
  removeTyping();

  const result=nb.classify(q);
  const topId=result.top[0];
  const topProb=result.top[1];
  const intent=intentMap[topId];
  const isLow=topProb<CONF_THRESHOLD;
  if(isLow)lowConf++;
  updateStats(topId);

  /* build all-scores bar */
  const allBars=result.all.map(([id,prob])=>{
    const it=intentMap[id];
    const pct=Math.round(prob*100);
    return `<div class="as-row"><span class="as-name">${it.label}</span><div class="as-bar"><div class="as-fill" style="width:${pct}%;background:${it.color}"></div></div><span class="as-val">${pct}%</span></div>`;
  }).join('');

  let html='';
  if(isLow){
    html=`<span style="font-size:12.5px;color:var(--color-text-secondary)">I'm not fully confident about your intent (best match: ${Math.round(topProb*100)}%). Could you rephrase? Or pick a topic:</span>`;
    html+=`<div class="chips">${INTENTS.map(i=>`<span class="chip" onclick="go('${i.examples[0]}')" style="border-color:${i.color};color:${i.text};background:${i.bg}">${i.label}</span>`).join('')}</div>`;
  }else{
    html=`<div class="intent-badge" style="background:${intent.bg};color:${intent.text}">${intent.label}</div>`;
    html+=`<div style="margin-top:7px;font-size:12.5px;color:var(--color-text-primary);line-height:1.6">${intent.response}</div>`;
    html+=`<div class="conf-row"><span class="conf-label">Confidence</span><div class="conf-track"><div class="conf-fill" style="width:${Math.min(topProb*140,100)}%;background:${intent.color}"></div></div><span class="conf-val" style="color:${intent.color}">${Math.round(topProb*100)}%</span></div>`;
    if(result.all.length>1&&result.all[1][1]>0.08){
      html+=`<div style="margin-top:7px;font-size:10.5px;color:var(--color-text-tertiary);margin-bottom:3px">All intent scores</div>`;
      html+=`<div class="all-scores">${allBars}</div>`;
    }
  }
  addMsg('b',html);
  btn.disabled=false;inp.focus();
}

document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
addMsg('b',`Multinomial Naive Bayes classifier trained on <strong>140 labelled examples</strong> across 7 intents. Each query is tokenised, stop words removed, and scored with log-prior + log-likelihood per class. Softmax converts scores to probabilities. The highest-probability intent routes your query to the correct answer.
<div class="chips">${INTENTS.map(i=>`<span class="chip" style="border-color:${i.color};color:${i.text};background:${i.bg}" onclick="go('${i.examples[0]}')">${i.label}</span>`).join('')}</div>`);
</script>
