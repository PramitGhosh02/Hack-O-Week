
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Financial Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f0f4f8; --panel:#ffffff; --card:#ffffff;
    --border:#e2e8f0; --accent:#1a56db; --accent2:#0a7c59;
    --red:#dc2626; --blue:#1d4ed8; --purple:#6d28d9;
    --text:#0f172a; --muted:#64748b; --white:#ffffff;
    --font-display:'DM Serif Display',serif;
    --font-mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--font-mono); font-size:13px;
    min-height:100vh; overflow-x:hidden;
  }

  /* HEADER */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:1.5rem 2.5rem;
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:100;
    background:#ffffff; box-shadow:0 1px 6px rgba(15,23,42,.07);
  }
  .logo{
    font-family:var(--font-display); font-size:1.5rem;
    color:var(--accent); letter-spacing:.02em;
  }
  .logo span{color:var(--text);}
  .badge{
    font-size:10px; padding:3px 10px; border-radius:99px;
    background:rgba(10,124,89,.1); color:var(--accent2);
    border:1px solid rgba(10,124,89,.25); letter-spacing:.08em;
    text-transform:uppercase;
  }
  .live-dot{
    display:inline-block; width:7px; height:7px;
    background:var(--accent2); border-radius:50%; margin-right:6px;
    animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  /* LAYOUT */
  .wrapper{padding:2rem 2.5rem; max-width:1400px; margin:0 auto;}
  .grid-3{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1rem; margin-bottom:2rem;}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2rem;}
  @media(max-width:900px){.grid-2{grid-template-columns:1fr;}}

  /* CARDS */
  .card{
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:1.5rem;
    box-shadow:0 1px 3px rgba(15,23,42,.06);
    transition:border-color .2s,transform .2s,box-shadow .2s;
  }
  .card:hover{
    border-color:rgba(26,86,219,.3);
    box-shadow:0 4px 20px rgba(26,86,219,.08);
  }
  .card-title{
    font-family:var(--font-display); font-size:1rem;
    color:var(--muted); margin-bottom:1rem; letter-spacing:.02em;
  }
  .big-num{
    font-family:var(--font-display); font-size:2rem;
    color:var(--text); line-height:1;
  }
  .sub{font-size:11px; color:var(--muted); margin-top:.35rem;}

  /* ASSET SELECTOR */
  .selector-wrap{
    display:flex; gap:1rem; align-items:center; margin-bottom:2rem;
    flex-wrap:wrap;
  }
  select, input[type=number]{
    background:#ffffff; border:1px solid var(--border);
    color:var(--text); padding:.65rem 1rem; border-radius:10px;
    font-family:var(--font-mono); font-size:13px; outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  select:focus, input[type=number]:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(26,86,219,.1);
  }
  select{min-width:260px; cursor:pointer;}
  input[type=number]{width:200px;}
  .btn{
    background:var(--accent); color:#fff; border:none;
    padding:.65rem 1.5rem; border-radius:10px; cursor:pointer;
    font-family:var(--font-mono); font-weight:500; font-size:13px;
    transition:opacity .2s, transform .15s;
    box-shadow:0 2px 8px rgba(26,86,219,.25);
  }
  .btn:hover{opacity:.88; transform:translateY(-1px);}
  .label{
    font-size:11px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.1em; display:block; margin-bottom:.4rem;
  }

  /* GAUGE */
  .gauge-wrap{position:relative; text-align:center;}
  .gauge-canvas{width:180px!important; height:100px!important;}
  .gauge-label{
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    font-family:var(--font-display); font-size:1.6rem; color:var(--text);
  }
  .gauge-sub{font-size:10px; color:var(--muted); margin-top:2px;}

  /* METRIC ROW */
  .metric-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:.55rem 0; border-bottom:1px solid var(--border);
  }
  .metric-row:last-child{border-bottom:none;}
  .metric-key{color:var(--muted); font-size:12px;}
  .metric-val{color:var(--text); font-weight:500;}

  /* PILL */
  .pill{
    display:inline-block; padding:3px 12px; border-radius:99px;
    font-size:11px; font-weight:500; letter-spacing:.06em;
  }
  .pill-green{background:rgba(10,124,89,.1); color:#0a7c59; border:1px solid rgba(10,124,89,.25);}
  .pill-yellow{background:rgba(26,86,219,.1); color:var(--accent); border:1px solid rgba(26,86,219,.25);}
  .pill-red{background:rgba(220,38,38,.1); color:var(--red); border:1px solid rgba(220,38,38,.25);}
  .pill-blue{background:rgba(29,78,216,.1); color:var(--blue); border:1px solid rgba(29,78,216,.25);}
  .pill-purple{background:rgba(109,40,217,.1); color:var(--purple); border:1px solid rgba(109,40,217,.25);}

  /* CHART CONTAINERS */
  .chart-box{position:relative; height:300px; width:100%;}
  .chart-box-tall{position:relative; height:200px; width:100%;}
  .section-title{
    font-family:var(--font-display); font-size:1.3rem; color:var(--text);
    margin-bottom:1.2rem; display:flex; align-items:center; gap:.6rem;
  }
  .divider{height:1px; background:var(--border); margin:2rem 0;}

  /* RISK METER BAR */
  .bar-track{
    height:8px; background:#e2e8f0; border-radius:99px;
    overflow:hidden; margin-top:.5rem;
  }
  .bar-fill{
    height:100%; border-radius:99px;
    transition:width .8s cubic-bezier(.4,0,.2,1);
  }

  /* RETURN TABLE */
  table{width:100%; border-collapse:collapse; font-size:12px;}
  th{
    text-align:left; padding:.5rem .75rem;
    color:var(--muted); font-weight:500; font-size:11px;
    text-transform:uppercase; letter-spacing:.08em;
    border-bottom:2px solid var(--border);
    background:#f8fafc;
  }
  td{padding:.55rem .75rem; border-bottom:1px solid #f1f5f9;}
  tr:hover td{background:#f8fafc;}
  .pos{color:#0a7c59; font-weight:500;} .neg{color:var(--red); font-weight:500;}

  /* PREDICT SECTION */
  .predict-card{
    background:linear-gradient(135deg,#eff6ff 0%,#f8faff 100%);
    border:1px solid rgba(26,86,219,.15); border-radius:16px; padding:2rem;
    margin-bottom:2rem;
  }
  .predict-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:1rem; margin-top:1.5rem;
  }
  .predict-item{
    text-align:center; padding:1.2rem;
    background:#ffffff; border-radius:12px;
    border:1px solid var(--border);
    box-shadow:0 1px 3px rgba(15,23,42,.05);
    transition:border-color .2s, box-shadow .2s;
  }
  .predict-item:hover{
    border-color:rgba(26,86,219,.3);
    box-shadow:0 4px 14px rgba(26,86,219,.09);
  }
  .predict-item .period{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.5rem;}
  .predict-item .amount{
    font-family:var(--font-display); font-size:1.3rem; color:var(--text); margin-bottom:.3rem;
  }
  .predict-item .gain{font-size:11px;}

  /* SPARKLINE */
  .spark-row{
    display:flex; align-items:center; gap:.8rem; padding:.5rem 0;
    border-bottom:1px solid var(--border);
  }
  .spark-row:last-child{border-bottom:none;}
  .spark-name{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .spark-meta{display:flex; flex-direction:column; align-items:flex-end; min-width:80px;}
  .spark-chart{flex-shrink:0; width:90px; height:30px;}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:4px; height:4px;}
  ::-webkit-scrollbar-track{background:#f1f5f9;}
  ::-webkit-scrollbar-thumb{background:#cbd5e1; border-radius:99px;}

  /* ANIMATION */
  .fade-in{animation:fadeIn .4s ease forwards;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* RSI zone */
  .rsi-status{
    font-size:11px; padding:2px 8px; border-radius:4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">FinSight <span>AI</span></div>
  <div style="display:flex;align-items:center;gap:1rem">
    <span class="badge"><span class="live-dot"></span>Live Data</span>
    <span style="color:var(--muted);font-size:11px" id="ts"></span>
  </div>
</header>

<div class="wrapper">

  <!-- ── ASSET SELECTOR ───────────────────────────────────────── -->
  <div style="margin:2rem 0 1rem">

      <div>
        <span class="label">Asset</span>
        <select id="assetSel"></select>
      </div>
      <div>
        <span class="label">Investment Amount (₹)</span>
        <input type="number" id="investAmt" value="50000" min="1000" step="1000">

      <div style="align-self:flex-end">
        <button class="btn" onclick="loadAsset()">Analyze</button>
      </div>
    </div>
  </div>

  <!-- ── SUMMARY STRIP ─────────────────────────────────────────── -->
  <div class="grid-3" id="summaryStrip"></div>

  <!-- ── MAIN CONTENT ──────────────────────────────────────────── -->
  <div id="mainContent"></div>

</div><!-- /wrapper -->

// ── CHART REGISTRY ───────────────────────────────────────────────
const charts = {};
function killChart(id) { if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

// ── POPULATE SELECTOR ────────────────────────────────────────────
const sel = document.getElementById('assetSel');
Object.entries(ASSETS).forEach(([k,v]) => {
  const o = document.createElement('option');
  o.value = k;
  o.textContent = v.name + (v.type==='stock' ? '' : '');
  sel.appendChild(o);
});

// timestamp
document.getElementById('ts').textContent = new Date().toLocaleString('en-IN');

// ── UTILS ─────────────────────────────────────────────────────────
const fmt  = n => '₹'+Number(n).toLocaleString('en-IN',{maximumFractionDigits:2});
const pct  = n => (n>=0?'+':'')+n.toFixed(2)+'%';
const pctn = n => (n*100).toFixed(2)+'%';
const clr  = n => n>=0 ? 'var(--accent2)' : 'var(--red)';
const pillRec = r => ({'STRONG BUY':'pill-green','BUY':'pill-green','HOLD':'pill-yellow','WATCH':'pill-blue','SELL':'pill-red'})[r]||'pill-purple';

function scoreColor(s){
  if(s>=75) return 'var(--accent2)';
  if(s>=55) return 'var(--accent)';
  return 'var(--red)';
}

function riskLabel(v){
  if(v<0.12) return {l:'Low',c:'pill-green'};
  if(v<0.22) return {l:'Medium',c:'pill-yellow'};
  if(v<0.35) return {l:'High',c:'pill-red'};
  return {l:'Very High',c:'pill-red'};
}

// project investment
function project(principal, annRet, yrs){
  return principal * Math.pow(1 + annRet, yrs);
}

// ── LOAD ASSET ────────────────────────────────────────────────────
function loadAsset(){
  const key    = sel.value;
  const a      = ASSETS[key];
  const invest = parseFloat(document.getElementById('investAmt').value)||50000;
  if(!a) return;

  const chg     = ((a.price - a.price_prev)/a.price_prev)*100;
  const rl      = riskLabel(a.ann_vol);
  const scoreC  = scoreColor(a.score);
  const n       = a.dates.length;
  const recent  = 90;
  const datesR  = a.dates.slice(-recent);
  const closesR = a.closes.slice(-recent);
  const ma20R   = a.ma20.slice(-recent);
  const ma50R   = a.ma50.slice(-recent);
  const bb_upR  = a.bb_up.slice(-recent);
  const bb_dnR  = a.bb_dn.slice(-recent);
  const rsiR    = a.rsi.slice(-recent);
  const volR    = a.vol.slice(-recent).map(v=>v*100);
  const curRSI  = rsiR[rsiR.length-1];

  // ── SUMMARY STRIP ──
  document.getElementById('summaryStrip').innerHTML = `

      <div class="card-title">Current Price</div>

    </div>
    <div class="card fade-in" style="animation-delay:.1s">
      <div class="card-title">Annual Return</div>

      <div class="card-title">Risk (Volatility)</div>
      <div class="big-num">${(a.ann_vol*100).toFixed(1)}%</div>
      <div class="sub" style="margin-top:.5rem"><span class="pill ${rl.c}">${rl.l} Risk</span></div>
    </div>
    <div class="card fade-in" style="animation-delay:.2s">
      <div class="card-title">Sharpe Ratio</div>
      <div class="big-num" style="color:${a.sharpe>1?'var(--accent2)':a.sharpe>0.5?'var(--accent)':'var(--red)'}">  ${a.sharpe.toFixed(2)}</div>

  const rsiPct  = curRSI;
  const rsiColor = curRSI > 70 ? '#dc2626' : curRSI < 30 ? '#0a7c59' : '#1d4ed8';
  const rsiLbl  = curRSI > 70 ? 'Overbought' : curRSI < 30 ? 'Oversold' : 'Neutral';

  // cumulative return for projection chart
  const projLabels = ['Now','6M','1Y','2Y','3Y','5Y','10Y'];
  const projYrs    = [0,0.5,1,2,3,5,10];
  const projBase   = projYrs.map(y=>Math.round(project(invest,annRet,y)));
  const projBull   = projYrs.map(y=>Math.round(project(invest,optimistic,y)));
  const projBear   = projYrs.map(y=>Math.round(project(invest,pessimistic,y)));

  // ── RENDER ──
  document.getElementById('mainContent').innerHTML = `

  <!-- ASSET HEADER -->
  <div class="card fade-in" style="margin-bottom:1.5rem;padding:1.8rem;border-left:4px solid var(--accent)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
      <div>
        <h2 style="font-family:var(--font-display);font-size:1.6rem;color:var(--text);margin-bottom:.3rem">${a.name}</h2>
        <div style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap">
          <span class="pill pill-blue">${a.type==='stock'?'Stock':'Mutual Fund'}</span>
          <span class="pill pill-purple">${a.sector}</span>
          <span class="pill ${pillRec(a.rec)}">${a.rec}</span>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-display);font-size:2rem;color:var(--text)">${fmt(a.price)}</div>
        <div style="color:${clr(chg)};font-size:13px">${pct(chg)} today</div>
      </div>
    </div>
  </div>

  <!-- ROW 1: Chart + Risk -->
  <div class="grid-2">

    <!-- PRICE CHART -->
    <div class="card fade-in">
      <div class="section-title">Price History (90 days)</div>
      <div style="display:flex;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap">
        <button onclick="toggleSeries('priceChart','MA 20')" class="btn" style="background:transparent;border:1px solid #6d28d9;color:#6d28d9;font-size:11px;padding:3px 10px;box-shadow:none">MA20</button>
        <button onclick="toggleSeries('priceChart','MA 50')" class="btn" style="background:transparent;border:1px solid #b45309;color:#b45309;font-size:11px;padding:3px 10px;box-shadow:none">MA50</button>
        <button onclick="toggleSeries('priceChart','BB Upper')" class="btn" style="background:transparent;border:1px solid #94a3b8;color:#64748b;font-size:11px;padding:3px 10px;box-shadow:none">Bands</button>
      </div>
      <div class="chart-box"><canvas id="priceChart"></canvas></div>
    </div>

    <!-- RISK BREAKDOWN -->
    <div class="card fade-in" style="animation-delay:.08s">
      <div class="section-title">Risk & Volatility Breakdown</div>

      <div style="margin-bottom:1.2rem">
        <div style="display:flex;justify-content:space-between">
          <span class="metric-key">Annual Volatility</span>
          <span class="metric-val" style="color:${volColor}">${(a.ann_vol*100).toFixed(2)}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${volPct}%;background:${volColor}"></div></div>
      </div>

      <div style="margin-bottom:1.2rem">
        <div style="display:flex;justify-content:space-between">
          <span class="metric-key">Max Drawdown</span>
          <span class="metric-val" style="color:var(--red)">${(a.max_dd*100).toFixed(2)}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${ddPct}%;background:var(--red)"></div></div>
      </div>

      <div style="margin-bottom:1.2rem">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="metric-key">RSI (14)</span>
          <span style="display:flex;align-items:center;gap:.4rem">
            <span class="metric-val" style="color:${rsiColor}">${curRSI.toFixed(1)}</span>
            <span class="pill" style="font-size:10px;padding:1px 7px;background:${rsiColor}18;color:${rsiColor};border:1px solid ${rsiColor}44">${rsiLbl}</span>
          </span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${rsiPct}%;background:${rsiColor}"></div></div>
      </div>

      <div class="divider" style="margin:1rem 0"></div>

      <div class="metric-row">
        <span class="metric-key">Sharpe Ratio</span>
        <span class="metric-val" style="color:${a.sharpe>1?'var(--accent2)':a.sharpe>0.5?'var(--accent)':'var(--red)'}">${a.sharpe.toFixed(3)}</span>
      </div>
      <div class="metric-row">
        <span class="metric-key">Ann. Return (hist.)</span>
        <span class="metric-val" style="color:${clr(a.ann_ret)}">${(a.ann_ret*100).toFixed(2)}%</span>
      </div>
      <div class="metric-row">
        <span class="metric-key">Risk Classification</span>
        <span><span class="pill ${rl.c}">${rl.l} Risk</span></span>
      </div>
      <div class="metric-row">
        <span class="metric-key">AI Recommendation</span>
        <span><span class="pill ${pillRec(a.rec)}">${a.rec}</span></span>
      </div>
    </div>
  </div>

  <!-- ROW 2: RSI + Volatility Charts -->
  <div class="grid-2">
    <div class="card fade-in">
      <div class="section-title">RSI (14-day)</div>
      <div class="chart-box-tall"><canvas id="rsiChart"></canvas></div>
    </div>
    <div class="card fade-in" style="animation-delay:.08s">
      <div class="section-title">Rolling Volatility (20-day)</div>
      <div class="chart-box-tall"><canvas id="volChart"></canvas></div>
    </div>
  </div>

  <!-- RETURN PREDICTION -->
  <div class="predict-card fade-in">
    <div class="section-title">Return Prediction for ${fmt(invest)}</div>
    <div style="color:var(--muted);font-size:12px;margin-bottom:.5rem">
      Based on historical annual return of <strong style="color:var(--text)">${(annRet*100).toFixed(2)}%</strong>.
      Bear case uses <strong style="color:var(--red)">${(pessimistic*100).toFixed(1)}%</strong>,
      Bull case uses <strong style="color:var(--accent2)">${(optimistic*100).toFixed(1)}%</strong>.
    </div>
    <div class="predict-grid">${predItems}</div>
  </div>

  <!-- ROW 3: Projection chart + Return table -->
  <div class="grid-2">
    <div class="card fade-in">
      <div class="section-title">Investment Growth Projection</div>
      <div class="chart-box"><canvas id="projChart"></canvas></div>
    </div>
    <div class="card fade-in" style="animation-delay:.08s">
      <div class="section-title">Detailed Return Table</div>
      <table>
        <thead><tr>
          <th>Period</th><th>Invested</th><th>Base Value</th><th>Gain / Loss</th><th>CAGR</th>
        </tr></thead>
        <tbody id="retTable"></tbody>
      </table>
    </div>
  </div>

  <!-- ALL ASSETS OVERVIEW -->
  <div class="divider"></div>
  <div class="grid-2">
    <div class="card fade-in">
      <div class="section-title">All Assets — AI Score Ranking</div>
      <div class="chart-box"><canvas id="scoreBar"></canvas></div>
    </div>
    <div class="card fade-in" style="animation-delay:.08s">
      <div class="section-title">Risk vs Return Map</div>
      <div class="chart-box"><canvas id="riskReturn"></canvas></div>
    </div>
  </div>

  `;

  // ── BUILD CHARTS ─────────────────────────────────────────────
  const tickOpts = {color:'#94a3b8',font:{family:'DM Mono',size:10}};
  const gridOpts = {color:'rgba(226,232,240,.9)'};

  // 1. PRICE CHART
  killChart('priceChart');
  charts['priceChart'] = new Chart(document.getElementById('priceChart'),{
    type:'line',
    data:{
      labels:datesR,
      datasets:[
        {label:'Price',data:closesR,borderColor:'#1a56db',backgroundColor:'rgba(26,86,219,.07)',
          borderWidth:2,pointRadius:0,fill:true,tension:.3},
        {label:'MA 20',data:ma20R,borderColor:'#6d28d9',borderWidth:1.5,
          pointRadius:0,fill:false,tension:.3,borderDash:[]},
        {label:'MA 50',data:ma50R,borderColor:'#b45309',borderWidth:1.5,
          pointRadius:0,fill:false,tension:.3,borderDash:[4,4]},
        {label:'BB Upper',data:bb_upR,borderColor:'rgba(148,163,184,.6)',borderWidth:1,
          pointRadius:0,fill:false,tension:.3,borderDash:[2,4]},
        {label:'BB Lower',data:bb_dnR,borderColor:'rgba(148,163,184,.6)',borderWidth:1,
          pointRadius:0,fill:false,tension:.3,borderDash:[2,4]},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#64748b',font:{size:11,family:'DM Mono'},
        boxWidth:12,padding:16}}},
      scales:{
        x:{ticks:{...tickOpts,maxTicksLimit:6},grid:gridOpts},
        y:{ticks:tickOpts,grid:gridOpts}
      }
    }
  });

  // 2. RSI CHART
  killChart('rsiChart');
  charts['rsiChart'] = new Chart(document.getElementById('rsiChart'),{
    type:'line',
    data:{
      labels:datesR,
      datasets:[{
        label:'RSI',data:rsiR,
        borderColor:'#1a56db',backgroundColor:'rgba(26,86,219,.06)',
        borderWidth:2,pointRadius:0,fill:true,tension:.3
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        annotation:{annotations:{
          ob:{type:'line',yMin:70,yMax:70,borderColor:'#dc2626',borderWidth:1,borderDash:[4,4]},
          os:{type:'line',yMin:30,yMax:30,borderColor:'#0a7c59',borderWidth:1,borderDash:[4,4]}
        }}
      },
      scales:{
        x:{ticks:{...tickOpts,maxTicksLimit:5},grid:gridOpts},
        y:{min:0,max:100,ticks:tickOpts,grid:gridOpts}
      }
    }
  });

  // ── RSI reference lines via plugin ──
  const rsiPlugin = {
    id:'rsiLines',
    afterDraw(chart){
      const {ctx,scales:{y,x}} = chart;
      [{v:70,c:'#dc2626'},{v:30,c:'#0a7c59'}].forEach(line=>{
        const yPos = y.getPixelForValue(line.v);
        ctx.save();
        ctx.strokeStyle=line.c; ctx.lineWidth=1;
        ctx.setLineDash([4,4]);
        ctx.beginPath();
        ctx.moveTo(x.left,yPos); ctx.lineTo(x.right,yPos);
        ctx.stroke(); ctx.restore();
      });
    }
  };
  Chart.register(rsiPlugin);

  // 3. VOLATILITY CHART
  killChart('volChart');
  charts['volChart'] = new Chart(document.getElementById('volChart'),{
    type:'bar',
    data:{
      labels:datesR,
      datasets:[{
        label:'Volatility %',data:volR,
        backgroundColor:volR.map(v=>v<1.2?'rgba(10,124,89,.75)':v<2.2?'rgba(180,83,9,.75)':'rgba(220,38,38,.75)'),
        borderRadius:2
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{...tickOpts,maxTicksLimit:5},grid:{display:false}},
        y:{ticks:tickOpts,grid:gridOpts}
      }
    }
  });

  // 4. PROJECTION CHART
  killChart('projChart');
  charts['projChart'] = new Chart(document.getElementById('projChart'),{
    type:'line',
    data:{
      labels:projLabels,
      datasets:[
        {label:'Bull Case',data:projBull,borderColor:'#0a7c59',borderWidth:2,
          pointRadius:4,fill:false,tension:.3,borderDash:[]},
        {label:'Base Case',data:projBase,borderColor:'#1a56db',borderWidth:2.5,
          pointRadius:4,fill:false,tension:.3},
        {label:'Bear Case',data:projBear,borderColor:'#dc2626',borderWidth:2,
          pointRadius:4,fill:false,tension:.3,borderDash:[4,4]},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#64748b',font:{size:11,family:'DM Mono'},boxWidth:12}},
        tooltip:{
          callbacks:{
            label:ctx=>'  '+ctx.dataset.label+': ₹'+ctx.parsed.y.toLocaleString('en-IN')
          }
        }
      },
      scales:{
        x:{ticks:tickOpts,grid:gridOpts},
        y:{
          ticks:{...tickOpts,callback:v=>'₹'+Number(v).toLocaleString('en-IN',{notation:'compact'})},
          grid:gridOpts
        }
      }
    }
  });

  // 5. RETURN TABLE
  const tbody = document.getElementById('retTable');
  const tPeriods = [
    {l:'6 Months',y:0.5},{l:'1 Year',y:1},{l:'2 Years',y:2},
    {l:'3 Years',y:3},{l:'5 Years',y:5},{l:'10 Years',y:10}
  ];
  tbody.innerHTML = tPeriods.map(p => {
    const val  = project(invest,annRet,p.y);
    const gain = val-invest;
    const cagr = (Math.pow(val/invest,1/p.y)-1)*100;
    return `<tr>
      <td>${p.l}</td>
      <td>${fmt(invest)}</td>
      <td>${fmt(Math.round(val))}</td>
      <td class="${gain>=0?'pos':'neg'}">${gain>=0?'+':''}${fmt(Math.round(gain))}</td>
      <td class="${cagr>=0?'pos':'neg'}">${cagr.toFixed(2)}%</td>
    </tr>`;
  }).join('');

  // 6. ALL-ASSETS SCORE BAR
  killChart('scoreBar');
  const allKeys    = Object.keys(ASSETS);
  const allNames   = allKeys.map(k=>ASSETS[k].name.split(' ').slice(0,2).join(' '));
  const allScores  = allKeys.map(k=>ASSETS[k].score);
  const allColors  = allScores.map(s=>s>=75?'rgba(10,124,89,.85)':s>=55?'rgba(26,86,219,.85)':'rgba(220,38,38,.85)');
  charts['scoreBar'] = new Chart(document.getElementById('scoreBar'),{
    type:'bar',
    data:{
      labels:allNames,
      datasets:[{label:'AI Score',data:allScores,backgroundColor:allColors,borderRadius:6}]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{
          label:ctx=>' Score: '+ctx.parsed.x+'/100  ('+Object.values(ASSETS)[ctx.dataIndex].rec+')'
        }}
      },
      scales:{
        x:{min:0,max:100,ticks:tickOpts,grid:gridOpts},
        y:{ticks:{...tickOpts,font:{size:10,family:'DM Mono'}},grid:{display:false}}
      }
    }
  });

  // 7. RISK vs RETURN SCATTER
  killChart('riskReturn');
  const scatterData = Object.entries(ASSETS).map(([k,v])=>({
    x:+(v.ann_vol*100).toFixed(2),
    y:+(v.ann_ret*100).toFixed(2),
    label:v.name.split(' ').slice(0,2).join(' '),
    score:v.score
  }));
  charts['riskReturn'] = new Chart(document.getElementById('riskReturn'),{
    type:'scatter',
    data:{
      datasets:[{
        label:'Assets',
        data:scatterData,
        backgroundColor:scatterData.map(d=>d.score>=75?'rgba(10,124,89,.8)':d.score>=55?'rgba(26,86,219,.8)':'rgba(220,38,38,.8)'),
        pointRadius:8,pointHoverRadius:11
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:ctx=>`${ctx.raw.label}  Risk:${ctx.raw.x}%  Ret:${ctx.raw.y}%  Score:${ctx.raw.score}`
          }
        }
      },
      scales:{
        x:{title:{display:true,text:'Risk (Volatility %)',color:'#64748b',font:{size:11}},ticks:tickOpts,grid:gridOpts},
        y:{title:{display:true,text:'Return (%)',color:'#64748b',font:{size:11}},ticks:tickOpts,grid:gridOpts}
      }
    }
  });

} // end loadAsset

// toggle chart dataset
function toggleSeries(chartId, label){
  const c = charts[chartId]; if(!c) return;
  const ds = c.data.datasets.find(d=>d.label===label);
  if(ds){ ds.hidden=!ds.hidden; c.update(); }
}

// auto-load first asset
loadAsset();
</script>
</body>
</html>
